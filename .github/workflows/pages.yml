name: Deploy simple app

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: CI 확인
        run: echo "CI success"

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 배포
        uses: actions/deploy-pages@v4
